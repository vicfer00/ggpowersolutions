  <!-- Modal for lightbox -->
  <div class="modal fade" id="galleryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content bg-transparent border-0">
        <div class="modal-body p-0 text-center position-relative">
          <button type="button" class="btn-close position-absolute end-0 m-3 top-0" data-bs-dismiss="modal" aria-label="Close"></button>
          <!-- Previous Button -->
          <button type="button" class="btn btn-light position-absolute start-0 top-50 translate-middle-y ms-3" id="gallery-prev" aria-label="Previous image">
            <i class="bi bi-chevron-left"></i>
          </button>
          <img src="" alt="" id="gallery-modal-image" class="img-fluid rounded">
          <p id="gallery-modal-caption" class="text-white mt-2"></p>
          <!-- Next Button -->
          <button type="button" class="btn btn-light position-absolute end-0 top-50 translate-middle-y me-3" id="gallery-next" aria-label="Next image">
            <i class="bi bi-chevron-right"></i>

  <script src="assets/js/gallery.js"></script>
  <script>
    function loadComponent(id, file) {
      fetch(file)
        .then(response => response.text())
        .then(data => document.getElementById(id).innerHTML = data);
    }
    loadComponent("header", "header.html");
    loadComponent("footer", "footer.html");
  </script>
